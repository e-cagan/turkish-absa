model:
  name: dbmdz/bert-base-turkish-cased   # BERTurk
  max_length: 256

labeling:
  provider: ollama               # anthropic | ollama
  model: gemma3:12b              # claude-sonnet-4-6 for higher-quality labels
  sample_n: 2000                 # how many train reviews to weak-label
  workers: 1                     # concurrent API calls (I/O bound)
  max_retries: 2
  out_path: data/labeled.jsonl

aspects:                         # closed taxonomy: name -> definition (injected into the prompt)
  urun_kalitesi: "ürünün kalitesi, etkisi, işe yarayıp yaramadığı, dokusu/kıvamı"
  fiyat: "fiyat, pahalı/ucuz olması, fiyat-performans"
  kargo_teslimat: "kargo hızı, teslimat süresi, kargo/teslimat süreci"
  ambalaj: "paketleme, kutu/şişe durumu, sızıntı, hasar"
  koku: "ürünün kokusu"
  kalicilik: "etkinin veya kokunun ne kadar kalıcı olduğu"
  musteri_hizmetleri: "satıcı/mağaza iletişimi, iade, destek süreci"

sentiment_labels: [negatif, notr, pozitif]

data:
  hf_id: maydogan/Turkish_SentimentAnalysis_TRSAv1
  min_chars: 40          # below this, reviews rarely contain >1 aspect
  splits_dir: data/splits
  test_size: 0.15
  val_size: 0.15
  seed: 42

train:
  out_dir: models/absa
  gold_n: 180
  val_frac: 0.1
  epochs: 3
  batch_size: 8
  grad_accum: 2
  lr: 2.0e-5
  max_length: 192